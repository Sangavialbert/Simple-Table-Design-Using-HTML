<!DOCTYPE html>
<html>
<head>
    <title>Colorful Table</title>
    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px auto;
        }

        th {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
        }

        td {
            background-color: #f2f2f2;
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #d9edf7;
        }

        table, th, td {
            border: 1px solid black;
        }

        h2 {
            text-align: center;
            color: #2E8B57;
        }
    </style>
</head>
<body>

    <h2>Student Details</h2>

    <table>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Department</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Sangavi</td>
            <td>CSE</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Priya</td>
            <td>IT</td>
        </tr>
        <tr>
            <td>103</td>
            <td>Rahul</td>
            <td>ECE</td>
        </tr>
    </table>

</body>
</html>
